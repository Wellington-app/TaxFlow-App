<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#4F46E5" />
    <title>TaxFlow - Gestão Tributária</title>
  </head>
    <div id="root">
      <div style="display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; color: #6366f1; background: #F8FAFC;">
        <div style="text-align: center; padding: 20px;">
          <div id="spinner" style="width: 40px; height: 40px; border: 4px solid #e0e7ff; border-top: 4px solid #6366f1; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px;"></div>
          <p id="loading-text" style="font-weight: 600; margin: 0;">TaxFlow</p>
          <p id="debug-info" style="font-size: 11px; color: #94a3b8; margin-top: 10px; background: #f1f5f9; padding: 8px; border-radius: 4px; min-width: 200px;">Carregando arquivos...</p>
        </div>
      </div>
      <script>
        // Captura erros globais
        window.onerror = function(msg, url, line) {
          document.getElementById('debug-info').innerHTML = '<span style="color: #ef4444;">Erro: ' + msg + '</span>';
          return false;
        };
        
        // Captura erros de carregamento de arquivos (404)
        window.addEventListener('error', function(e) {
          if (e.target.tagName === 'SCRIPT') {
            document.getElementById('debug-info').innerHTML = '<span style="color: #ef4444;">Erro ao carregar código principal. Verifique o upload.</span>';
          }
        }, true);

        document.addEventListener('DOMContentLoaded', function() {
          document.getElementById('debug-info').innerHTML = 'Arquivos prontos, iniciando interface...';
        });

        window.hideLoadingScreen = function() {
          var root = document.getElementById('root');
          if (root) root.innerHTML = ''; 
        };
      </script>
      <style>
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
      </style>
    </div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
